<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta property="og:type" content="website" />
<meta property="og:url" content="https://infinitysmp.github.io/tools/joincode-maker" />
<meta property="og:title" content="Infinity | Join Code Builder" />
<meta property="og:description" content="Build and export Minecraft join codes using icons!" />
<meta property="og:image" content="https://infinitysmp.github.io/logo.png" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Infinity | Join Code Builder</title>
<link rel="icon" type="image/png" href="https://infinitysmp.github.io/logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html { overflow-x: hidden; overflow-y: auto; }
body::-webkit-scrollbar, html::-webkit-scrollbar { display: none; }
body, html { -ms-overflow-style: none; scrollbar-width: none; }

:root {
    --bg-primary: #0a1929;
    --bg-secondary: #0d2137;
    --bg-tertiary: #132f4c;
    --text-primary: #e3f2fd;
    --text-secondary: #90caf9;
    --text-tertiary: #64b5f6;
    --accent: #2196f3;
    --accent-hover: #42a5f5;
    --accent-dark: #1976d2;
    --border: rgba(33, 150, 243, 0.15);
    --border-hover: rgba(33, 150, 243, 0.3);
    --shadow-sm: 0 2px 8px rgba(33, 150, 243, 0.1);
    --shadow-md: 0 4px 20px rgba(33, 150, 243, 0.15);
    --shadow-lg: 0 12px 48px rgba(33, 150, 243, 0.25);
    --shadow-glow: 0 0 40px rgba(33, 150, 243, 0.2);
    --radius-sm: 10px;
    --radius-md: 14px;
    --radius-lg: 20px;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 40px 20px 80px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    position: relative;
}

body::before {
    content: "";
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 30% 50%, rgba(33,150,243,0.1) 0%, transparent 50%),
                radial-gradient(circle at 70% 50%, rgba(33,150,243,0.05) 0%, transparent 50%);
    animation: float 20s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
}

@keyframes float {
    0%, 100% { transform: translate(0,0) rotate(0deg); }
    33% { transform: translate(30px,-30px) rotate(5deg); }
    66% { transform: translate(-20px,20px) rotate(-5deg); }
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
}

.particles {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 0; overflow: hidden;
}
.particle {
    position: absolute; width: 3px; height: 3px;
    background: var(--accent); border-radius: 50%;
    opacity: 0; animation: float-particle 15s infinite;
    box-shadow: 0 0 10px var(--accent);
}
@keyframes float-particle {
    0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
    10%  { opacity: 0.5; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(-100px) translateX(100px); opacity: 0; }
}
.particle:nth-child(1) { left: 10%; animation-delay: 0s; }
.particle:nth-child(2) { left: 25%; animation-delay: 3s; }
.particle:nth-child(3) { left: 40%; animation-delay: 6s; }
.particle:nth-child(4) { left: 60%; animation-delay: 9s; }
.particle:nth-child(5) { left: 75%; animation-delay: 12s; }
.particle:nth-child(6) { left: 90%; animation-delay: 2s; }

.container {
    width: 100%; max-width: 1000px;
    margin: 0 auto; position: relative; z-index: 1;
    animation: fadeInUp 0.8s cubic-bezier(0.16,1,0.3,1);
}

/* HEADER */
.header {
    text-align: center;
    margin-bottom: 48px;
}
.logo-container { margin-bottom: 28px; animation: fadeIn 0.6s ease-out; }
.logo {
    width: 80px; height: 80px;
    margin: 0 auto; border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    box-shadow: var(--shadow-glow), var(--shadow-lg);
    background: var(--bg-secondary);
    border: 2px solid var(--border);
    transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
    text-decoration: none;
}
.logo:hover {
    transform: scale(1.05) translateY(-5px);
    box-shadow: 0 0 60px rgba(33,150,243,0.4), var(--shadow-lg);
    border-color: var(--accent);
}
.logo img { width: 100%; height: 100%; object-fit: cover; }

h1 {
    font-size: 48px; font-weight: 700;
    letter-spacing: -0.03em; margin-bottom: 12px;
    background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    animation: fadeIn 0.6s ease-out 0.2s backwards;
}
.subtitle {
    font-size: 18px; color: var(--text-secondary);
    font-weight: 400; max-width: 600px;
    margin: 0 auto; line-height: 1.6;
    animation: fadeIn 0.6s ease-out 0.3s backwards;
}
.back-link {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--accent); font-size: 14px; font-weight: 500;
    text-decoration: none; margin-top: 12px;
    opacity: 0.8; transition: opacity 0.2s, gap 0.2s;
    animation: fadeIn 0.6s ease-out 0.35s backwards;
}
.back-link:hover { opacity: 1; gap: 10px; }

/* PANEL */
.panel {
    background: var(--bg-secondary);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-md);
    padding: 36px;
    margin-bottom: 24px;
    position: relative; overflow: hidden;
    animation: fadeInUp 0.6s ease-out 0.4s backwards;
}
.panel::before {
    content: "";
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent-hover));
}
.panel-title {
    font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-tertiary); margin-bottom: 20px;
}

/* CONTROLS */
.controls-row {
    display: flex; flex-wrap: wrap;
    align-items: center; gap: 16px;
}
.control-group {
    display: flex; flex-direction: column; gap: 6px;
}
.control-group label {
    font-size: 12px; font-weight: 500;
    color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em;
}
.control-group select,
.control-group input[type="number"] {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    padding: 8px 12px; font-size: 14px;
    outline: none; width: 100px;
    transition: border-color 0.2s;
    font-family: inherit;
}
.control-group select:focus,
.control-group input[type="number"]:focus {
    border-color: var(--accent);
}

.btn-export {
    margin-left: auto;
    padding: 10px 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    border: none; border-radius: var(--radius-sm);
    color: white; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 16px rgba(33,150,243,0.3);
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
    display: flex; align-items: center; gap: 8px;
}
.btn-export:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(33,150,243,0.5);
}
.btn-export:active { transform: translateY(0); }

/* SLOTS */
#slots {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 8px;
}
.slot {
    border: 2px dashed rgba(33,150,243,0.3);
    border-radius: var(--radius-md);
    padding: 8px;
    cursor: pointer;
    background: var(--bg-tertiary);
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
    position: relative;
}
.slot:hover {
    border-color: rgba(33,150,243,0.6);
    transform: translateY(-2px);
    box-shadow: var(--shadow-sm);
}
.slot.active {
    border: 2px solid var(--accent);
    box-shadow: 0 0 20px rgba(33,150,243,0.3);
    transform: translateY(-4px);
}
.slot .slot-label {
    position: absolute; bottom: -22px; left: 50%;
    transform: translateX(-50%);
    font-size: 11px; color: var(--text-tertiary);
    white-space: nowrap; font-weight: 500;
}
.slot.active .slot-label { color: var(--accent); }
.slot img {
    display: block; border-radius: 8px;
    transition: opacity 0.2s;
    image-rendering: pixelated;
}
.slot img[src=""] { opacity: 0.2; }

.slots-wrapper { padding-bottom: 30px; }

/* ICONS */
#icons {
    display: grid;
    grid-template-columns: repeat(auto-fill, 88px);
    justify-content: center;
    gap: 12px;
}
.icon-item {
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
    cursor: pointer;
    padding: 10px 6px;
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    background: var(--bg-tertiary);
    transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
}
.icon-item:hover {
    border-color: var(--border-hover);
    transform: translateY(-3px) scale(1.05);
    box-shadow: var(--shadow-md);
    background: rgba(33,150,243,0.08);
}
.icon-item img {
    width: 56px; height: 56px;
    border-radius: 6px;
    image-rendering: pixelated;
}
.icon-item span {
    font-size: 10px; color: var(--text-tertiary);
    text-align: center; line-height: 1.3;
    max-width: 80px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
}

canvas { display: none; }

/* FOOTER */
.footer {
    text-align: center; margin-top: 64px;
    padding-top: 28px; border-top: 1px solid var(--border);
    animation: fadeIn 0.6s ease-out 0.8s backwards;
}
.footer-text { font-size: 13px; color: var(--text-tertiary); line-height: 1.6; }
.footer-text a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
.footer-text a:hover { color: var(--accent-hover); text-decoration: underline; }

@media (max-width: 640px) {
    h1 { font-size: 34px; }
    .panel { padding: 24px; }
    .btn-export { margin-left: 0; width: 100%; justify-content: center; }
    #icons { grid-template-columns: repeat(auto-fill, 76px); }
}
</style>
</head>
<body>

<div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>

<div class="container">

    <div class="header">
        <div class="logo-container">
            <a href="https://infinitysmp.github.io/" class="logo">
                <img src="https://infinitysmp.github.io/addon.png" alt="Infinity SMP" />
            </a>
        </div>
        <h1>Join Code Builder</h1>
        <p class="subtitle">Build and export Minecraft join codes by selecting icons for each slot.</p>
        <a href="https://infinitysmp.github.io/tools" class="back-link">← Back to Tools</a>
    </div>

    <!-- Controls -->
    <div class="panel">
        <div class="panel-title">Settings</div>
        <div class="controls-row">
            <div class="control-group">
                <label>Slots</label>
                <select id="slotCount">
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>
            <div class="control-group">
                <label>Icon Size (px)</label>
                <input type="number" id="size" value="90" min="50" max="600" />
            </div>
            <div class="control-group">
                <label>Slot Gap (px)</label>
                <input type="number" id="gap" value="20" min="0" max="200" />
            </div>
            <button class="btn-export" onclick="exportImage()">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Export PNG
            </button>
        </div>
    </div>

    <!-- Slots -->
    <div class="panel">
        <div class="panel-title">Your Code</div>
        <div class="slots-wrapper">
            <div id="slots"></div>
        </div>
    </div>

    <!-- Icons -->
    <div class="panel" style="animation-delay: 0.5s">
        <div class="panel-title">Choose an Icon</div>
        <div id="icons"></div>
    </div>

    <div class="footer">
        <p class="footer-text">
            Made with ❤️ by <a href="https://infinitysmp.github.io/">Infinity SMP</a> &nbsp;·&nbsp;
            <a href="https://infinitysmp.github.io/tools">Back to Tools</a>
        </p>
    </div>

</div>

<canvas id="canvas"></canvas>

<script>
const images = [
    "Book and Quill.png","Balloon.png","Rail.png","Alex.png","Cookie.png","Fish.png",
    "Agent.png","Cake.png","Pickaxe.png","Water Bucket.png","Steve.png","Apple.png",
    "Carrot.png","Panda.png","Sign.png","Potion.png","Map.png","Llama.png"
];
const folder = "images/";
let activeSlot = 0;
const slotsDiv = document.getElementById("slots");
const iconsDiv = document.getElementById("icons");

function previewSize() { return Math.round(document.getElementById("size").value * 0.75); }

function updateSlotGap() {
    slotsDiv.style.gap = document.getElementById("gap").value + "px";
}

function buildSlots() {
    slotsDiv.innerHTML = "";
    const count = parseInt(document.getElementById("slotCount").value);
    const pSize = previewSize();
    updateSlotGap();
    for (let i = 0; i < count; i++) {
        const slot = document.createElement("div");
        slot.className = "slot";
        slot.dataset.index = i;

        const img = document.createElement("img");
        img.width = pSize; img.height = pSize;
        img.src = "";
        slot.appendChild(img);

        const label = document.createElement("div");
        label.className = "slot-label";
        label.textContent = `Slot ${i + 1}`;
        slot.appendChild(label);

        slot.onclick = function () { activeSlot = i; highlightSlot(); };
        slotsDiv.appendChild(slot);
    }
    highlightSlot();
}

function highlightSlot() {
    document.querySelectorAll(".slot").forEach((s, i) => {
        s.classList.toggle("active", i === activeSlot);
    });
}

function buildIcons() {
    images.forEach(name => {
        const item = document.createElement("div");
        item.className = "icon-item";

        const img = document.createElement("img");
        img.src = folder + name;

        const label = document.createElement("span");
        label.textContent = name.replace(".png", "");

        item.appendChild(img);
        item.appendChild(label);
        item.onclick = () => setSlotImage(name);
        iconsDiv.appendChild(item);
    });
}

function setSlotImage(name) {
    const slots = document.querySelectorAll(".slot");
    const slot = slots[activeSlot];
    const img = slot.querySelector("img");
    img.src = folder + name;
    img.dataset.name = name;
    if (activeSlot < slots.length - 1) { activeSlot++; highlightSlot(); }
}

document.getElementById("slotCount").onchange = buildSlots;
document.getElementById("size").oninput = () => {
    const pSize = previewSize();
    document.querySelectorAll(".slot img").forEach(i => { i.width = pSize; i.height = pSize; });
};
document.getElementById("gap").oninput = updateSlotGap;

function exportImage() {
    const size = parseInt(document.getElementById("size").value);
    const gap = parseInt(document.getElementById("gap").value);
    const slots = document.querySelectorAll(".slot img");
    const canvas = document.getElementById("canvas");
    canvas.width = slots.length * size + gap * (slots.length - 1);
    canvas.height = size;
    const ctx = canvas.getContext("2d");
    let loaded = 0;
    let filled = 0;
    slots.forEach(s => { if (s.src && !s.src.endsWith("/")) filled++; });
    if (filled === 0) return;

    slots.forEach((slot, i) => {
        if (!slot.src || slot.src.endsWith("/")) { loaded++; return; }
        const img = new Image();
        img.onload = function () {
            ctx.drawImage(img, i * (size + gap), 0, size, size);
            loaded++;
            if (loaded === slots.length) {
                const link = document.createElement("a");
                link.download = "joincode.png";
                link.href = canvas.toDataURL();
                link.click();
            }
        };
        img.src = slot.src;
    });
}

buildSlots();
buildIcons();
</script>
</body>
</html>
