<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AllForOne SMP | Navbar</title>
        <link rel="icon" type="image/x-icon" href="https://allforonesmp.github.io/images/logo.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Spectral:wght@600;700&family=Bebas+Neue&display=swap"
            rel="stylesheet" />
        <style>
            :root {
                --primary-blue: #4a90e2;
                --light-blue: #e8f4f8;
                --lighter-blue: #f5fbfd;
                --dark-blue: #2c5f8d;
                --text-dark: #1a2332;
                --text-medium: #4a5568;
                --border-color: #d4e8f0;
                --white: #ffffff;
                --nav-height: 64px;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html,
            body {
                background: var(--white);
                overflow: hidden;
                height: var(--nav-height);
                width: 100%;
            }

            nav {
                width: 100%;
                height: var(--nav-height);
                background: var(--white);
                border-bottom: 2px solid var(--border-color);
                box-shadow: 0 2px 16px rgba(74, 144, 226, 0.1);
                display: flex;
                align-items: center;
                padding: 0 2rem;
                font-family: "DM Sans", sans-serif;
            }

            .nav-inner {
                width: 100%;
                max-width: 1400px;
                margin: 0 auto;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .logo {
                font-family: "Spectral", serif;
                font-size: 1.6rem;
                font-weight: 700;
                color: var(--primary-blue);
                text-decoration: none;
                letter-spacing: -0.01em;
                white-space: nowrap;
                flex-shrink: 0;
                transition: color 0.2s;
            }
            .logo:hover {
                color: var(--dark-blue);
            }

            .nav-links {
                display: flex;
                align-items: center;
                gap: 0.25rem;
                list-style: none;
            }
            .nav-links a {
                color: var(--text-medium);
                text-decoration: none;
                font-weight: 500;
                font-size: 0.97rem;
                padding: 0.45rem 0.9rem;
                border-radius: 8px;
                transition:
                    color 0.18s,
                    background 0.18s;
                white-space: nowrap;
            }
            .nav-links a:hover {
                color: var(--primary-blue);
                background: var(--lighter-blue);
            }
            .nav-links a.active {
                color: var(--primary-blue);
                background: var(--light-blue);
                font-weight: 600;
            }

            .hamburger {
                display: none;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 5px;
                background: none;
                border: none;
                cursor: pointer;
                padding: 0.5rem;
                border-radius: 8px;
                transition: background 0.18s;
                flex-shrink: 0;
            }
            .hamburger:hover {
                background: var(--lighter-blue);
            }
            .hamburger span {
                display: block;
                width: 24px;
                height: 2.5px;
                background: var(--text-medium);
                border-radius: 2px;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                transform-origin: center;
            }
            .hamburger.open span:nth-child(1) {
                transform: translateY(7.5px) rotate(45deg);
            }
            .hamburger.open span:nth-child(2) {
                opacity: 0;
                transform: scaleX(0);
            }
            .hamburger.open span:nth-child(3) {
                transform: translateY(-7.5px) rotate(-45deg);
            }

            @media (max-width: 700px) {
                nav {
                    padding: 0 1rem;
                }
                .nav-links {
                    display: none;
                }
                .hamburger {
                    display: flex;
                }
            }
        </style>
    </head>
    <body>
        <nav>
            <div class="nav-inner">
                <a href="https://allforonesmp.github.io" class="logo">AllForOne SMP</a>

                <ul class="nav-links">
                    <li><a href="https://allforonesmp.github.io" data-path="/">🏠 Home</a></li>
                    <li><a href="https://allforonesmp.github.io/rules" data-path="/rules">📜 Rules</a></li>
                    <li><a href="https://allforonesmp.github.io/profile" data-path="/profile">👤 Profile</a></li>
                    <li><a href="https://allforonesmp.github.io/post" data-path="/post">📝 Post</a></li>
                </ul>

                <button class="hamburger" id="hamburgerBtn" aria-label="Open menu" onclick="handleHamburger()">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </nav>

        <script>
            window.addEventListener("message", (e) => {
                // Highlight active link based on parent page path
                if (e.data && e.data.type === "afo-pathname") {
                    const pathname = e.data.pathname;
                    document.querySelectorAll("[data-path]").forEach((a) => {
                        const path = a.getAttribute("data-path");
                        const match =
                            pathname === path ||
                            (path === "/" && (pathname === "" || pathname === "/index.html" || pathname === "/"));
                        a.classList.toggle("active", match);
                    });
                }
                // Sync hamburger icon with drawer open/close state
                if (e.data && e.data.type === "afo-drawer-state") {
                    document.getElementById("hamburgerBtn").classList.toggle("open", e.data.open);
                }
            });

            // Clicking hamburger tells the parent to toggle the drawer
            function handleHamburger() {
                window.parent.postMessage({ type: "afo-toggle-drawer" }, "*");
            }

            // Signal to parent that navbar iframe is ready
            window.parent.postMessage({ type: "afo-navbar-ready" }, "*");
        </script>
    </body>
</html>
