<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AllForOne SMP</title>
        <link rel="icon" type="image/x-icon" href="https://allforonesmp.github.io/images/logo.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Spectral:wght@600;700&display=swap"
            rel="stylesheet" />
        <style>
            :root {
                --primary-blue: #4a90e2;
                --light-blue: #e8f4f8;
                --lighter-blue: #f5fbfd;
                --dark-blue: #2c5f8d;
                --text-dark: #1a2332;
                --text-medium: #4a5568;
                --border-color: #d4e8f0;
                --white: #ffffff;
                --nav-height: 64px;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html,
            body {
                height: 100%;
                width: 100%;
                overflow: hidden;
                background: var(--white);
                font-family: "DM Sans", sans-serif;
            }

            /* ─── NAV ─── */
            nav {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                height: var(--nav-height);
                background: rgba(255, 255, 255, 0.92);
                backdrop-filter: blur(16px) saturate(180%);
                -webkit-backdrop-filter: blur(16px) saturate(180%);
                border-bottom: 1.5px solid var(--border-color);
                box-shadow: 0 2px 24px rgba(74, 144, 226, 0.08);
                display: flex;
                align-items: center;
                padding: 0 2rem;
                z-index: 100;
            }

            .nav-inner {
                width: 100%;
                max-width: 1400px;
                margin: 0 auto;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .logo {
                font-family: "Spectral", serif;
                font-size: 1.6rem;
                font-weight: 700;
                color: var(--primary-blue);
                text-decoration: none;
                letter-spacing: -0.01em;
                white-space: nowrap;
                flex-shrink: 0;
                transition: color 0.2s;
                cursor: pointer;
            }
            .logo:hover {
                color: var(--dark-blue);
            }

            .nav-links {
                display: flex;
                align-items: center;
                gap: 0.2rem;
                list-style: none;
            }

            .nav-links button {
                color: var(--text-medium);
                background: none;
                border: none;
                font-family: "DM Sans", sans-serif;
                font-weight: 500;
                font-size: 0.97rem;
                padding: 0.45rem 0.9rem;
                border-radius: 8px;
                cursor: pointer;
                transition:
                    color 0.18s,
                    background 0.18s;
                white-space: nowrap;
                position: relative;
            }
            .nav-links button:hover {
                color: var(--primary-blue);
                background: var(--lighter-blue);
            }
            .nav-links button.active {
                color: var(--primary-blue);
                background: var(--light-blue);
                font-weight: 600;
            }

            /* animated underline for active */
            .nav-links button::after {
                content: "";
                position: absolute;
                bottom: 4px;
                left: 50%;
                right: 50%;
                height: 2px;
                background: var(--primary-blue);
                border-radius: 2px;
                transition:
                    left 0.25s cubic-bezier(0.4, 0, 0.2, 1),
                    right 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .nav-links button.active::after {
                left: 12px;
                right: 12px;
            }

            /* ─── HAMBURGER ─── */
            .hamburger {
                display: none;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 5px;
                background: none;
                border: none;
                cursor: pointer;
                padding: 0.5rem;
                border-radius: 8px;
                transition: background 0.18s;
                flex-shrink: 0;
            }
            .hamburger:hover {
                background: var(--lighter-blue);
            }
            .hamburger span {
                display: block;
                width: 24px;
                height: 2.5px;
                background: var(--text-medium);
                border-radius: 2px;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                transform-origin: center;
            }
            .hamburger.open span:nth-child(1) {
                transform: translateY(7.5px) rotate(45deg);
            }
            .hamburger.open span:nth-child(2) {
                opacity: 0;
                transform: scaleX(0);
            }
            .hamburger.open span:nth-child(3) {
                transform: translateY(-7.5px) rotate(-45deg);
            }

            /* ─── MOBILE DRAWER ─── */
            .drawer {
                position: fixed;
                top: var(--nav-height);
                left: 0;
                right: 0;
                background: rgba(255, 255, 255, 0.97);
                backdrop-filter: blur(20px);
                border-bottom: 1.5px solid var(--border-color);
                box-shadow: 0 8px 32px rgba(74, 144, 226, 0.12);
                z-index: 99;
                overflow: hidden;
                max-height: 0;
                transition:
                    max-height 0.38s cubic-bezier(0.4, 0, 0.2, 1),
                    opacity 0.28s ease;
                opacity: 0;
            }
            .drawer.open {
                max-height: 320px;
                opacity: 1;
            }
            .drawer-links {
                list-style: none;
                padding: 0.75rem 1rem 1rem;
                display: flex;
                flex-direction: column;
                gap: 0.25rem;
            }
            .drawer-links button {
                width: 100%;
                text-align: left;
                background: none;
                border: none;
                font-family: "DM Sans", sans-serif;
                font-weight: 500;
                font-size: 1.05rem;
                color: var(--text-medium);
                padding: 0.7rem 1rem;
                border-radius: 10px;
                cursor: pointer;
                transition:
                    color 0.18s,
                    background 0.18s;
            }
            .drawer-links button:hover {
                color: var(--primary-blue);
                background: var(--lighter-blue);
            }
            .drawer-links button.active {
                color: var(--primary-blue);
                background: var(--light-blue);
                font-weight: 600;
            }

            /* ─── CONTENT AREA ─── */
            .content-shell {
                position: fixed;
                top: var(--nav-height);
                left: 0;
                right: 0;
                bottom: 0;
                overflow: hidden;
            }

            /* iframe wrapper — we stack them and animate */
            .frame-slot {
                position: absolute;
                inset: 0;
                opacity: 0;
                transform: translateY(18px) scale(0.985);
                transition:
                    opacity 0.42s cubic-bezier(0.4, 0, 0.2, 1),
                    transform 0.42s cubic-bezier(0.4, 0, 0.2, 1);
                pointer-events: none;
            }
            .frame-slot.visible {
                opacity: 1;
                transform: translateY(0) scale(1);
                pointer-events: auto;
            }
            .frame-slot.exit {
                opacity: 0;
                transform: translateY(-10px) scale(1.01);
                pointer-events: none;
            }

            .frame-slot iframe {
                width: 100%;
                height: 100%;
                border: none;
                display: block;
            }

            /* ─── LOADING SHIMMER ─── */
            .frame-loader {
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: var(--lighter-blue);
                gap: 1rem;
                transition: opacity 0.3s;
            }
            .frame-loader.hidden {
                opacity: 0;
                pointer-events: none;
            }

            .loader-spinner {
                width: 36px;
                height: 36px;
                border: 3px solid var(--border-color);
                border-top-color: var(--primary-blue);
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .loader-text {
                font-family: "DM Sans", sans-serif;
                color: var(--text-medium);
                font-size: 0.88rem;
                letter-spacing: 0.02em;
            }

            /* ─── PAGE TRANSITION RIPPLE ─── */
            .ripple-overlay {
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: 200;
                overflow: hidden;
            }
            .ripple {
                position: absolute;
                border-radius: 50%;
                background: rgba(74, 144, 226, 0.12);
                transform: scale(0);
                animation: rippleOut 0.55s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            }
            @keyframes rippleOut {
                to {
                    transform: scale(40);
                    opacity: 0;
                }
            }

            @media (max-width: 700px) {
                nav {
                    padding: 0 1rem;
                }
                .nav-links {
                    display: none;
                }
                .hamburger {
                    display: flex;
                }
            }
        </style>
    </head>
    <body>
        <nav>
            <div class="nav-inner">
                <span class="logo" onclick="navigate('/', event)">AllForOne SMP</span>

                <ul class="nav-links" id="navLinks">
                    <li><button data-path="/" onclick="navigate('/', event)">Home</button></li>
                    <li><button data-path="/rules" onclick="navigate('/rules', event)">Rules</button></li>
                    <li><button data-path="/profile" onclick="navigate('/profile', event)">Profile</button></li>
                    <li><button data-path="/post" onclick="navigate('/post', event)">Post</button></li>
                </ul>

                <button class="hamburger" id="hamburgerBtn" aria-label="Open menu" onclick="toggleDrawer()">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </nav>

        <!-- Mobile Drawer -->
        <div class="drawer" id="drawer">
            <ul class="drawer-links" id="drawerLinks">
                <li><button data-path="/" onclick="navigate('/', event); closeDrawer()">Home</button></li>
                <li><button data-path="/rules" onclick="navigate('/rules', event); closeDrawer()">Rules</button></li>
                <li>
                    <button data-path="/profile" onclick="navigate('/profile', event); closeDrawer()">Profile</button>
                </li>
                <li><button data-path="/post" onclick="navigate('/post', event); closeDrawer()">Post</button></li>
            </ul>
        </div>

        <!-- Ripple overlay -->
        <div class="ripple-overlay" id="rippleOverlay"></div>

        <!-- Iframe content area -->
        <div class="content-shell" id="contentShell"></div>

        <script>
            const BASE = "https://allforonesmp.github.io/";
            const ROUTES = {
                "/": BASE + "/main.html",
                "/rules": BASE + "/rules",
                "/profile": BASE + "/profile",
                "/post": BASE + "/post"
            };

            const shell = document.getElementById("contentShell");
            const overlay = document.getElementById("rippleOverlay");
            const drawer = document.getElementById("drawer");
            const hamburger = document.getElementById("hamburgerBtn");

            let currentPath = null;
            let frames = {}; // path → { slot, iframe, loaded }
            let activeSlot = null;

            // ── ripple animation ──
            function spawnRipple(e) {
                const r = document.createElement("div");
                r.className = "ripple";
                const size = 60;
                const x = (e?.clientX ?? window.innerWidth / 2) - size / 2;
                const y = (e?.clientY ?? window.innerHeight / 2) - size / 2;
                r.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px;`;
                overlay.appendChild(r);
                r.addEventListener("animationend", () => r.remove());
            }

            // ── create / show a frame ──
            function getOrCreateFrame(path) {
                if (frames[path]) return frames[path];

                const slot = document.createElement("div");
                slot.className = "frame-slot";

                const loader = document.createElement("div");
                loader.className = "frame-loader";
                loader.innerHTML = `<div class="loader-spinner"></div><p class="loader-text">Loading…</p>`;
                slot.appendChild(loader);

                const iframe = document.createElement("iframe");
                iframe.src = ROUTES[path];
                iframe.style.opacity = "0";
                iframe.style.transition = "opacity 0.35s";

                iframe.addEventListener("load", () => {
                    iframe.style.opacity = "1";
                    loader.classList.add("hidden");

                    // tell the iframe its path (for active-link highlighting in embedded navbars)
                    try {
                        iframe.contentWindow.postMessage({ type: "afo-pathname", pathname: path }, "*");
                    } catch (_) {}
                });

                slot.appendChild(iframe);
                shell.appendChild(slot);

                frames[path] = { slot, iframe, loaded: false };
                return frames[path];
            }

            function setActiveButtons(path) {
                document.querySelectorAll("[data-path]").forEach((btn) => {
                    btn.classList.toggle("active", btn.getAttribute("data-path") === path);
                });
            }

            function navigate(path, e) {
                if (path === currentPath) return;
                spawnRipple(e);

                // exit current
                if (activeSlot) {
                    activeSlot.classList.remove("visible");
                    activeSlot.classList.add("exit");
                    const old = activeSlot;
                    setTimeout(() => old.classList.remove("exit"), 450);
                }

                const frame = getOrCreateFrame(path);
                // slight delay so exit animation starts first
                setTimeout(() => {
                    frame.slot.classList.add("visible");
                }, 60);

                activeSlot = frame.slot;
                currentPath = path;
                setActiveButtons(path);
            }

            // ── drawer ──
            function toggleDrawer() {
                const open = drawer.classList.toggle("open");
                hamburger.classList.toggle("open", open);
            }
            function closeDrawer() {
                drawer.classList.remove("open");
                hamburger.classList.remove("open");
            }

            // close drawer on outside click
            document.addEventListener("click", (e) => {
                if (!drawer.contains(e.target) && !hamburger.contains(e.target)) {
                    closeDrawer();
                }
            });

            // ── boot: load home ──
            navigate("/", null);
        </script>
    </body>
</html>
